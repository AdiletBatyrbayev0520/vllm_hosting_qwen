services:
  qwen3-vl-server:
    image: vllm/vllm-openai:latest
    container_name: qwen3-vl-vllm
    runtime: nvidia # Ensures GPU access
    ipc: host       # Required for vLLM shared memory performance
    ports:
      - "8000:8000"
    volumes:
      # Mounts a local cache so you don't redownload the model on every restart
      - ~/.cache/huggingface:/root/.cache/huggingface
    environment:
      # - HUGGING_FACE_HUB_TOKEN=your_token_here # Uncomment if using a gated model
      - CUDA_VISIBLE_DEVICES=0 # Change to "0,1" etc., if using multiple GPUs
      - HF_TOKEN=${HF_TOKEN}
    command: >
      --model Qwen/Qwen3-VL-8B-Instruct
      --trust-remote-code
      --max-model-len 16384
      --dtype auto
      --enforce-eager
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: "all"
              capabilities: [gpu]
  
  gemma-4-server:
    image: vllm/vllm-openai:latest
    container_name: gemma4
    runtime: nvidia
    ipc: host
    ports:
      - "8001:8001"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    environment:
      - HF_TOKEN=${HF_TOKEN}
    command: >
      --model google/gemma-4-E4B-it
      --max-model-len 32768
      --max-num-batched-tokens 8192
      --gpu-memory-utilization 0.90
      --host 0.0.0.0
      --port 8001
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: "all"
              capabilities: [gpu]

  openwebui:
    image: ghcr.io/open-webui/open-webui:main-slim
    ports:
      - "3000:8080"
    volumes:
      - open-webui:/app/backend/data
    environment:
      - HF_TOKEN=${HF_TOKEN}
volumes:
  open-webui: